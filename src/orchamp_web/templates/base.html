<!DOCTYPE html>
<html lang="{{ locale }}" data-theme="dark" data-theme-mode="system">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>{% block title %}Orchamp{% endblock %}</title>
    <script>
        // Resolve the theme before first paint to avoid a flash. The stored
        // value is the *mode* (light/dark/system); a missing/unknown value
        // means "system". In system mode the effective theme follows the OS
        // (defaulting to dark, the no-JS default).
        (function () {
            try {
                var saved = localStorage.getItem('orchamp-theme');
                var mode = (saved === 'light' || saved === 'dark' || saved === 'system')
                    ? saved
                    : 'system';
                var effective = (mode === 'system')
                    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
                    : mode;
                var de = document.documentElement;
                de.setAttribute('data-theme', effective);
                de.setAttribute('data-theme-mode', mode);
            } catch (e) { }
        })();
    </script>
    <script src="/static/htmx.min.js"></script>
    <style>
        /* Self-hosted fonts (served from /static/fonts, no external requests).
           IBM Plex Sans for body/UI, IBM Plex Mono for section headings. */
        @font-face {
            font-family: "IBM Plex Sans";
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url("/static/fonts/ibm-plex-sans-latin-400-normal.woff2") format("woff2");
        }

        @font-face {
            font-family: "IBM Plex Sans";
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url("/static/fonts/ibm-plex-sans-latin-600-normal.woff2") format("woff2");
        }

        @font-face {
            font-family: "IBM Plex Sans";
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url("/static/fonts/ibm-plex-sans-latin-700-normal.woff2") format("woff2");
        }

        @font-face {
            font-family: "IBM Plex Mono";
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url("/static/fonts/ibm-plex-mono-latin-600-normal.woff2") format("woff2");
        }

        :root {
            /* Dark theme (default) */
            --bg: #0d100e;
            --fg: #e6e9e6;
            --border: #272d29;
            --row-alt: #1a1e1b;
            --surface: #161b18;
            /* Green accent, split so each context stays contrast-safe:
               --accent        : fills, focus rings, tints
               --accent-text   : text/links on --bg (passes WCAG AA)
               --accent-contrast: text/icons drawn on top of an --accent fill */
            --accent: #34d399;
            --accent-text: #4ade80;
            --accent-contrast: #07120b;
            --row-hover: color-mix(in srgb, var(--accent) 13%, transparent);
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg: #f6f8f6;
            --fg: #16201a;
            --border: #dde2dd;
            --row-alt: #eef1ee;
            --surface: #ffffff;
            --accent: #16a34a;
            --accent-text: #15803d;
            --accent-contrast: #ffffff;
            --row-hover: color-mix(in srgb, var(--accent) 7%, transparent);
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            line-height: 1.5;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .league-nav {
            width: 160px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem 0.75rem;
            border-right: 1px solid var(--border);
            /* Pin to the viewport so the controls below stay visible when the
               league list is long. */
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .nav-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-brand {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            color: var(--fg);
            margin-bottom: 0.75rem;
            text-decoration: none;
        }

        .nav-brand:hover {
            opacity: 0.8;
            text-decoration: none;
        }

        .nav-league {
            display: block;
            font-size: 0.8rem;
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            color: var(--fg);
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-league:hover {
            background: var(--row-alt);
            text-decoration: none;
        }

        .nav-league.active {
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--accent-text);
            font-weight: 600;
        }

        .nav-controls {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--fg);
            cursor: pointer;
            padding: 0;
            font-size: 1.05rem;
            line-height: 1;
            opacity: 0.7;
        }

        .theme-toggle:hover {
            opacity: 1;
            background: var(--row-alt);
        }

        .theme-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            opacity: 1;
        }

        /* Only the icon for the current mode is shown (mode, not the
           effective theme: "system" keeps its own icon either way). */
        .theme-icon {
            display: none;
            width: 1.05rem;
            height: 1.05rem;
        }

        [data-theme-mode="dark"] .theme-icon--dark,
        [data-theme-mode="light"] .theme-icon--light,
        [data-theme-mode="system"] .theme-icon--system {
            display: block;
        }

        .nav-lang {
            display: flex;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .nav-lang a {
            color: var(--fg);
            opacity: 0.5;
            text-decoration: none;
        }

        .nav-lang a.active {
            opacity: 1;
            font-weight: 600;
        }

        .nav-lang a:hover {
            opacity: 0.8;
        }

        .nav-logout {
            margin: 0;
            display: flex;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--fg);
            cursor: pointer;
            padding: 0;
            opacity: 0.7;
        }

        .logout-btn svg {
            width: 1.05rem;
            height: 1.05rem;
        }

        .logout-btn:hover {
            opacity: 1;
            background: var(--row-alt);
        }

        .logout-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            opacity: 1;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem;
            max-width: 800px;
        }

        .main-content--wide {
            max-width: 1140px;
        }

        .standings-layout {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .standings-main {
            flex: 1;
            min-width: 0;
        }

        .assumptions-sidebar {
            width: 296px;
            flex-shrink: 0;
            position: sticky;
            top: 1rem;
            align-self: flex-start;
            border-left: 1px solid var(--border);
            padding-left: 1.5rem;
        }

        @media (max-width: 900px) {
            .standings-layout {
                flex-direction: column;
                align-items: stretch;
            }

            .assumptions-sidebar {
                width: 100%;
                position: static;
                order: -1;
                border-left: none;
                padding-left: 0;
            }
        }

        @media (max-width: 640px) {
            .app-layout {
                flex-direction: column;
            }

            .league-nav {
                position: static;
                height: auto;
                flex-direction: row;
                flex-wrap: nowrap;
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0.5rem;
                gap: 0.5rem;
                align-items: center;
            }

            .nav-scroll {
                flex-direction: row;
                overflow-x: auto;
                overflow-y: visible;
                align-items: center;
                gap: 0.25rem;
            }

            .nav-brand {
                margin-bottom: 0;
                white-space: nowrap;
            }

            .nav-controls {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }

            .main-content {
                padding: 0.75rem;
            }

            th,
            td {
                padding: 0.4rem 0.5rem;
            }

            .schedule-table .col-date {
                display: none;
            }

            .analysis-summary {
                flex-wrap: wrap;
            }
        }

        h1,
        h2,
        h3 {
            margin: 0 0 1rem;
            font-weight: 600;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Section titles use IBM Plex Mono for a touch of scoreboard character,
           kept smaller and marked with a small green tab. */
        h2,
        h3 {
            font-family: "IBM Plex Mono", ui-monospace, monospace;
        }

        h2 {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }

        h2::before {
            content: "";
            flex-shrink: 0;
            width: 3px;
            height: 1.05em;
            border-radius: 2px;
            background: var(--accent);
        }

        a {
            color: var(--accent-text);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Visible keyboard focus for every interactive element. */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible,
        [tabindex]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .skip-link {
            position: absolute;
            left: 0.5rem;
            top: -3rem;
            z-index: 10;
            background: var(--accent);
            color: var(--accent-contrast);
            padding: 0.5rem 0.75rem;
            border-radius: 0 0 6px 6px;
            transition: top 0.15s ease;
        }

        .skip-link:focus {
            top: 0;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th,
        td {
            padding: 0.4rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            background: var(--row-alt);
            border-bottom: 2px solid color-mix(in srgb, var(--accent) 40%, var(--border));
        }

        /* Hairline rows + a subtle green hover read denser and cleaner than
           zebra striping for this kind of stat table. */
        tbody tr:hover td {
            background: var(--row-hover);
        }

        /* Round/Date cells use rowspan within each round's own <tbody>, so
           hovering any match in a round also highlights that round's labels. */
        .schedule-table tbody:hover .col-round,
        .schedule-table tbody:hover .col-date {
            background: var(--row-hover);
        }

        .text-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .text-center {
            text-align: center;
        }

        .col-numeric {
            width: 1%;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* Let wide tables scroll horizontally instead of overflowing the page. */
        .table-wrap,
        #standings-table,
        #schedule {
            overflow-x: auto;
        }

        .refresh-btn {
            background: none;
            color: var(--fg);
            border: 1px solid currentColor;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0.6;
            vertical-align: middle;
            margin-left: 0.75rem;
        }

        .refresh-btn:hover {
            opacity: 1;
        }

        .refresh-btn.htmx-request {
            opacity: 0.3;
            cursor: wait;
        }

        .header {
            margin-bottom: 1rem;
        }

        .source-link {
            font-size: 0.875rem;
            color: var(--fg);
            opacity: 0.7;
        }

        .team-link {
            color: var(--accent-text);
            cursor: pointer;
        }

        .team-link:hover {
            text-decoration: underline;
        }

        .subtitle {
            margin: 0;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            opacity: 0.75;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .breadcrumb-sep {
            opacity: 0.5;
        }

        .analysis-summary {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .position-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
            min-width: 7rem;
        }

        .position-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.65;
        }

        .position-value {
            font-size: 2.25rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--accent-text);
            font-variant-numeric: tabular-nums;
        }

        .scenarios {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2rem;
        }

        .scenario h2 {
            margin-top: 0;
        }

        .scenario h3 {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: color-mix(in srgb, var(--fg) 60%, transparent);
            margin: 1.5rem 0 0.5rem;
        }

        .highlighted td {
            background: color-mix(in srgb, var(--accent) 14%, transparent) !important;
        }

        /* Green left bar marks the focused team's row (alongside bold text,
           so the cue is not colour-only). */
        .highlighted td:first-child {
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .winner {
            font-weight: 600;
            color: var(--accent-text);
        }

        .no-matches {
            opacity: 0.7;
            font-style: italic;
        }

        .loading {
            padding: 2rem;
            text-align: center;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0;
            animation: loading-appear 0.2s ease-in 0.15s forwards;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite, loading-appear 0.2s ease-in 0.15s forwards;
            flex-shrink: 0;
        }

        @keyframes loading-appear {
            to {
                opacity: 0.6;
            }
        }

        @keyframes loading-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .loading,
            .loading::before {
                animation: none;
                opacity: 0.6;
            }

            .skip-link {
                transition: none;
            }
        }

        .schedule-table .col-round {
            font-weight: 600;
            white-space: nowrap;
            width: 4rem;
        }

        .schedule-table .col-date {
            white-space: nowrap;
            width: 7rem;
            opacity: 0.6;
            font-size: 0.875rem;
        }

        .schedule-table .col-home {
            text-align: right;
        }

        .schedule-table .col-score-home {
            text-align: right;
            width: 2.5rem;
            font-variant-numeric: tabular-nums;
        }

        .schedule-table .col-sep {
            text-align: center;
            width: 1rem;
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }

        .schedule-table .col-score-away {
            text-align: left;
            width: 2.5rem;
            font-variant-numeric: tabular-nums;
        }

        .schedule-table .col-away {
            text-align: left;
        }

        .schedule-table .match-pending td {
            opacity: 0.5;
        }

        .schedule-table .match-pending td:has(.score-input) {
            opacity: 1;
        }

        .score-input {
            width: 2.5rem;
            padding: 0.125rem 0.25rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--bg);
            color: var(--fg);
            font-size: 0.875rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
            -moz-appearance: textfield;
        }

        .score-input::-webkit-inner-spin-button,
        .score-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .score-input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        #assumptions-panel {
            margin-bottom: 1rem;
        }

        .assumptions-panel {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            background: color-mix(in srgb, var(--accent) 6%, var(--bg));
        }

        .assumptions-panel h3 {
            margin: 0 0 0.75rem;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-text);
        }

        .assumptions-panel h3:not(:first-child) {
            margin-top: 1rem;
        }

        .assumptions-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .assumptions-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remove-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--fg);
            cursor: pointer;
            padding: 0.1rem 0.4rem;
            font-size: 0.875rem;
            opacity: 0.5;
            margin-left: auto;
        }

        .remove-btn:hover {
            opacity: 1;
            background: var(--row-alt);
        }

        .no-assumptions {
            opacity: 0.6;
            font-style: italic;
            font-size: 0.875rem;
            margin: 0 0 1rem;
        }

        .assumptions-banner {
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            background: color-mix(in srgb, var(--accent) 8%, var(--bg));
            font-size: 0.9rem;
        }

        .assumptions-banner ul {
            margin: 0.5rem 0 0;
            padding-left: 1.5rem;
        }

        .assumptions-banner li {
            margin: 0.25rem 0;
        }
    </style>
</head>

<body>
    <a href="#main" class="skip-link">{{ _("Skip to content") }}</a>
    <div class="app-layout">
        <nav class="league-nav">
            <div class="nav-scroll">
                <a href="/" class="nav-brand">Orchamp</a>
                {% for key, short_name in nav_leagues %}
                <a href="/web/{{ key }}/" class="nav-league{% if key == current_league_key %} active{% endif %}" {% if
                    key==current_league_key %} aria-current="page" {% endif %}>{{
                    short_name }}</a>
                {% endfor %}
            </div>
            <div class="nav-controls">
                <button type="button" class="theme-toggle" id="theme-toggle" data-label-dark="{{ _('Theme: dark') }}"
                    data-label-light="{{ _('Theme: light') }}" data-label-system="{{ _('Theme: system') }}"
                    aria-label="{{ _('Switch theme') }}" title="{{ _('Switch theme') }}">
                    <svg class="theme-icon theme-icon--dark" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <svg class="theme-icon theme-icon--light" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="theme-icon theme-icon--system" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" fill="none" />
                        <path d="M12 3 A9 9 0 0 0 12 21 Z" fill="currentColor" stroke="none" />
                    </svg>
                </button>
                <nav class="nav-lang">
                    <a href="/set-lang?lang=en" {% if locale=="en" %} class="active" {% endif %}>EN</a>
                    <a href="/set-lang?lang=fr" {% if locale=="fr" %} class="active" {% endif %}>FR</a>
                </nav>
                {% if auth_enabled %}
                <form method="post" action="/logout" class="nav-logout">
                    <button type="submit" class="logout-btn" title="{{ _('Log out') }}" aria-label="{{ _('Log out') }}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </button>
                </form>
                {% endif %}
            </div>
        </nav>
        <main id="main" class="main-content {% block main_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        // Attached rather than inline (onclick) so the page stays CSP-friendly.
        (function () {
            var de = document.documentElement;
            var btn = document.getElementById('theme-toggle');
            var mql = window.matchMedia('(prefers-color-scheme: light)');
            var nextMode = { system: 'light', light: 'dark', dark: 'system' };

            function currentMode() {
                return de.getAttribute('data-theme-mode') || 'system';
            }

            function effectiveFor(mode) {
                return (mode === 'system') ? (mql.matches ? 'light' : 'dark') : mode;
            }

            function apply(mode) {
                de.setAttribute('data-theme', effectiveFor(mode));
                de.setAttribute('data-theme-mode', mode);
                var label = btn.getAttribute('data-label-' + mode);
                if (label) {
                    btn.setAttribute('aria-label', label);
                    btn.setAttribute('title', label);
                }
            }

            apply(currentMode());

            btn.addEventListener('click', function () {
                var mode = nextMode[currentMode()] || 'system';
                try { localStorage.setItem('orchamp-theme', mode); } catch (e) { }
                apply(mode);
            });

            // While following the system, react to live OS theme changes.
            mql.addEventListener('change', function () {
                if (currentMode() === 'system') {
                    de.setAttribute('data-theme', effectiveFor('system'));
                }
            });
        })();
    </script>
</body>

</html>
