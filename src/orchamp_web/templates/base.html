<!DOCTYPE html>
<html lang="{{ locale }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Orchamp{% endblock %}</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #222;
            --accent: #2563eb;
            --border: #e5e7eb;
            --row-alt: #f3f4f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --fg: #e5e5e5;
                --accent: #60a5fa;
                --border: #333;
                --row-alt: #252525;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            line-height: 1.5;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .league-nav {
            width: 160px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding: 1rem 0.75rem;
            border-right: 1px solid var(--border);
        }

        .nav-brand {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            color: var(--fg);
            margin-bottom: 0.75rem;
            text-decoration: none;
        }

        .nav-brand:hover {
            opacity: 0.8;
            text-decoration: none;
        }

        .nav-league {
            display: block;
            font-size: 0.8rem;
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            color: var(--fg);
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-league:hover {
            background: var(--row-alt);
            text-decoration: none;
        }

        .nav-league.active {
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-spacer {
            flex: 1;
        }

        .nav-lang {
            display: flex;
            gap: 0.5rem;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .nav-lang a {
            color: var(--fg);
            opacity: 0.5;
            text-decoration: none;
        }

        .nav-lang a.active {
            opacity: 1;
            font-weight: 600;
        }

        .nav-lang a:hover {
            opacity: 0.8;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem;
            max-width: 800px;
        }

        @media (max-width: 640px) {
            .app-layout {
                flex-direction: column;
            }

            .league-nav {
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0.5rem;
                gap: 0.25rem;
                align-items: center;
            }

            .nav-brand {
                margin-bottom: 0;
                white-space: nowrap;
            }

            .nav-spacer {
                display: none;
            }
        }

        h1,
        h2 {
            font-weight: 600;
            margin: 0 0 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th,
        td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            background: var(--row-alt);
        }

        tr:nth-child(even) td {
            background: var(--row-alt);
        }

        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        .col-numeric {
            width: 1%;
            white-space: nowrap;
        }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .refresh-btn:hover {
            opacity: 0.9;
        }

        .htmx-request .refresh-btn {
            opacity: 0.5;
            cursor: wait;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .source-link {
            font-size: 0.875rem;
            color: var(--fg);
            opacity: 0.7;
        }

        .team-link {
            color: var(--accent);
            cursor: pointer;
        }

        .team-link:hover {
            text-decoration: underline;
        }

        .subtitle {
            margin: 0;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .analysis-summary {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .position-card {
            background: var(--row-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .position-label {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .position-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .scenarios {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2rem;
        }

        .scenario h2 {
            margin-top: 0;
        }

        .scenario h3 {
            font-size: 1rem;
            margin: 1.5rem 0 0.5rem;
        }

        .highlighted {
            background: color-mix(in srgb, var(--accent) 15%, transparent) !important;
        }

        .winner {
            font-weight: 600;
        }

        .no-matches {
            opacity: 0.7;
            font-style: italic;
        }

        .htmx-request .refresh-btn {
            opacity: 0.5;
            cursor: wait;
        }

        .schedule-table .col-round {
            font-weight: 600;
            white-space: nowrap;
            width: 4rem;
        }

        .schedule-table .col-date {
            white-space: nowrap;
            width: 7rem;
            opacity: 0.6;
            font-size: 0.875rem;
        }

        .schedule-table .col-home {
            text-align: right;
        }

        .schedule-table .col-score-home {
            text-align: right;
            width: 2.5rem;
            font-variant-numeric: tabular-nums;
        }

        .schedule-table .col-sep {
            text-align: center;
            width: 1rem;
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }

        .schedule-table .col-score-away {
            text-align: left;
            width: 2.5rem;
            font-variant-numeric: tabular-nums;
        }

        .schedule-table .col-away {
            text-align: left;
        }

        .schedule-table .match-pending td {
            opacity: 0.5;
        }

        .schedule-table .match-pending td:has(.score-input) {
            opacity: 1;
        }

        .score-input {
            width: 2.5rem;
            padding: 0.125rem 0.25rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--bg);
            color: var(--fg);
            font-size: 0.875rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
            -moz-appearance: textfield;
        }

        .score-input::-webkit-inner-spin-button,
        .score-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .score-input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        #assumptions-panel {
            margin-bottom: 1rem;
        }

        .assumptions-panel {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            background: color-mix(in srgb, var(--accent) 6%, var(--bg));
        }

        .assumptions-panel h3 {
            margin: 0 0 0.75rem;
            font-size: 1rem;
        }

        .assumptions-panel h3:not(:first-child) {
            margin-top: 1rem;
        }

        .assumptions-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .assumptions-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remove-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--fg);
            cursor: pointer;
            padding: 0.1rem 0.4rem;
            font-size: 0.875rem;
            opacity: 0.5;
            margin-left: auto;
        }

        .remove-btn:hover {
            opacity: 1;
            background: var(--row-alt);
        }

        .no-assumptions {
            opacity: 0.6;
            font-style: italic;
            font-size: 0.875rem;
            margin: 0 0 1rem;
        }

        .assumptions-banner {
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            background: color-mix(in srgb, var(--accent) 8%, var(--bg));
            font-size: 0.9rem;
        }

        .assumptions-banner ul {
            margin: 0.5rem 0 0;
            padding-left: 1.5rem;
        }

        .assumptions-banner li {
            margin: 0.25rem 0;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <nav class="league-nav">
            <a href="/" class="nav-brand">Orchamp</a>
            {% for key, short_name in nav_leagues %}
            <a href="/web/{{ key }}/" class="nav-league{% if key == current_league_key %} active{% endif %}">{{
                short_name }}</a>
            {% endfor %}
            <div class="nav-spacer"></div>
            <nav class="nav-lang">
                <a href="/set-lang?lang=en" {% if locale=="en" %} class="active" {% endif %}>EN</a>
                <a href="/set-lang?lang=fr" {% if locale=="fr" %} class="active" {% endif %}>FR</a>
            </nav>
        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
