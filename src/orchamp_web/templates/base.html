<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Orchamp{% endblock %}</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #222;
            --accent: #2563eb;
            --border: #e5e7eb;
            --row-alt: #f3f4f6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --fg: #e5e5e5;
                --accent: #60a5fa;
                --border: #333;
                --row-alt: #252525;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            font-weight: 600;
            margin: 0 0 1rem;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            background: var(--row-alt);
        }
        tr:nth-child(even) td {
            background: var(--row-alt);
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .refresh-btn:hover {
            opacity: 0.9;
        }
        .htmx-request .refresh-btn {
            opacity: 0.5;
            cursor: wait;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .source-link {
            font-size: 0.875rem;
            color: var(--fg);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
