app = "orchamp"
primary_region = "cdg"

[build]
image = "orchamp"

[[services]]
internal_port = 8080

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.tcp_checks]]
interval = "15s"
timeout = "2s"
grace_period = "1s"

[[vm]]
cpus = 1
memory_mb = 512

[[files]]
guest_path = "/home/one/app/config.toml"
local_path = "_local/config.toml"
